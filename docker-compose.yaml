services:
  ollama-node:
    image: ollama/ollama:latest
    container_name: ollamaNode
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollamaState:/root/.ollama
      - ./models:/models
    networks:
      - backendIsolated
      - frontendAccess
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_MODELS=/models
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=1
      # Controls inference thread count inside llama.cpp (OpenMP).
      # Lower = less heat. Raise if inference is too slow.
      - OMP_NUM_THREADS=4
    # Hard cap: container cannot use more than this many CPU cores worth of time.
    # Raise or lower to balance speed vs thermals (e.g. "2.0", "4.0", "8.0").
    cpus: "4.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    read_only: false

  mcp-gateway:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: mcpGateway
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - OLLAMA_URL=http://ollama-node:11434
    networks:
      - backendIsolated
      - frontendAccess
    depends_on:
      ollama-node:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    pids_limit: 256
    mem_limit: 1g
    cpus: "2.0"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 20s

networks:
  backendIsolated:
    internal: true
  frontendAccess:
    driver: bridge

volumes:
  ollamaState:
